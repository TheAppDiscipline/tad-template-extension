name: Gate Launch

# Runs the launch gate (gate:strict + scorecard + prod audit).
# It only enforces once you prepare a launch scorecard (.discipline/scorecard.yaml),
# so the template repo stays green until you reach PROFILE=LAUNCH.
#
# This extension lane has no backend of its own (sidecar pattern), so there is no
# cross-user RLS test here; that test lives in the web/mobile/desktop lanes (and in
# your sidecar web app, if you add one). The LLM security review lives in
# security-review.yml (opt-in: set the ANTHROPIC_API_KEY secret to enable it).

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gate-launch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Launch gate (enforced only when a scorecard.yaml exists)
        run: |
          if [ -f .discipline/scorecard.yaml ]; then
            echo "scorecard.yaml found — running gate:launch."
            npm run gate:launch
          else
            echo "No .discipline/scorecard.yaml yet. gate:launch enforces at PROFILE=LAUNCH; skipping."
          fi
